name: Monorepo CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abd
          POSTGRES_PASSWORD: abd_dev_password
          POSTGRES_DB: abd
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U abd"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://abd:abd_dev_password@localhost:5432/abd?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-do-not-use
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm --filter @abd/db exec prisma migrate deploy
        continue-on-error: true

      - name: Type-check all packages
        run: pnpm typecheck

      - name: Run proto tests
        run: pnpm --filter @abd/proto test

      - name: Build all packages
        run: pnpm build
